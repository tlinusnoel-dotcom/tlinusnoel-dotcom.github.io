<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>linusoffiziell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0f1117;
    --surface: #181b24;
    --surface-2: #1f232e;
    --border: #2a2d3a;
    --text: #e8e7ea;
    --text-dim: #8a8d98;
    --accent: #ff6b4a;
    --accent-2: #5eead4;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.6;
    overflow-x: hidden;
  }

  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

  a { color: inherit; text-decoration: none; }

  .wrap { max-width: 900px; margin: 0 auto; padding: 0 24px; }

  /* NAV */
  nav{
    position: fixed;
    top:0; left:0; right:0;
    background: rgba(15,17,23,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
  }

  nav .wrap{
    display:flex;
    align-items:center;
    justify-content:space-between;
    height: 64px;
  }

  .logo{ font-weight:700; font-size: 1.05rem; }
  .logo span{ color: var(--accent); }

  .nav-links{
    display:flex;
    gap: 28px;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  .nav-links a:hover{ color: var(--accent-2); }

  /* HERO */
  .hero{
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-top: 64px;
  }

  .hero .wrap{ display:grid; gap: 40px; }

  .eyebrow{
    color: var(--accent);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .hero h1{
    font-size: clamp(2.6rem, 7vw, 4.5rem);
    line-height: 1.05;
  }

  .accent{ color: var(--accent); }

  .role{
    margin-top: 18px;
    color: var(--text-dim);
    max-width: 540px;
  }

  /* TERMINAL */
  .terminal{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-width: 620px;
  }

  .terminal-bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding: 12px 16px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .dot{ width:11px; height:11px; border-radius:50%; }
  .red{ background:#ff5f56; }
  .yellow{ background:#ffbd2e; }
  .green{ background:#27c93f; }

  .terminal-title{
    margin-left: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .terminal-body{
    padding: 22px 20px;
    font-size: 0.92rem;
  }

  .cursor{
    display:inline-block;
    width:8px;
    background: var(--accent);
    animation: blink 1s infinite;
  }

  @keyframes blink{ 50%{opacity:0;} }

  /* SECTIONS */
  section{ padding: 100px 0; }

  .section-head{
    display:flex;
    align-items:baseline;
    gap: 16px;
    margin-bottom: 48px;
  }

  .index{ color: var(--accent); }

  .rule{ flex:1; height:1px; background: var(--border); }

  /* LINKS */
  .link-row{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }

  .link-row:hover{ background: var(--surface-2); }

  .link-row .icon{
    width: 18px;
    height: 18px;
    flex-shrink:0;
    color: var(--accent-2);
  }

  .meta{ flex:1; }

  .name{ font-size: 0.92rem; }

  .url{ font-size: 0.8rem; color: var(--text-dim); }

  .go{ color: var(--text-dim); }

  .link-row:hover .go{ color: var(--accent); }

  footer{
    border-top: 1px solid var(--border);
    padding: 32px 0;
    color: var(--text-dim);
    font-size: 0.82rem;
    display:flex;
    justify-content:space-between;
  }
</style>
</head>

<body>

<nav>
  <div class="wrap">
    <div class="logo">~/ <span>linus</span></div>
    <div class="nav-links">
      <a href="#about">about</a>
      <a href="#skills">skills</a>
      <a href="#projects">projects</a>
      <a href="#contact">contact</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <div>
      <div class="eyebrow">// Developer</div>
      <h1>Hi, ich bin <span class="accent">linusoffiziell</span></h1>
      <p class="role">Full-Stack Developer mit Fokus auf Web-Apps.</p>
    </div>

    <div class="terminal">
      <div class="terminal-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="terminal-title">terminal</span>
      </div>
      <div class="terminal-body">
        whoami<br>
        → developer<span class="cursor">|</span>
      </div>
    </div>
  </div>
</header>

<main class="wrap">

<section id="contact">
  <div class="section-head">
    <span class="index">04</span>
    <h2>Kontakt</h2>
    <div class="rule"></div>
  </div>

  <div class="terminal">

    <a class="link-row" href="mailto:mail@example.com">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <path d="M3 7l9 6 9-6"/>
      </svg>
      <div class="meta">
        <div class="name">E-Mail</div>
        <div class="url">mail@example.com</div>
      </div>
      <span class="go">→</span>
    </a>

    <a class="link-row" href="https://github.com/" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.48 0-.24-.01-1.04-.01-1.88-2.78.51-3.5-.7-3.72-1.34-.13-.34-.68-1.34-1.16-1.61-.4-.22-.97-.76-.01-.77.9-.01 1.55.85 1.76 1.21 1.03 1.78 2.68 1.28 3.34.97.1-.76.4-1.28.72-1.57-2.5-.29-5.12-1.29-5.12-5.71 0-1.26.44-2.3 1.16-3.11-.12-.29-.5-1.48.11-3.08 0 0 .96-.31 3.13 1.18a10.7 10.7 0 0 1 5.7 0c2.17-1.5 3.13-1.18 3.13-1.18.61 1.6.23 2.79.11 3.08.72.81 1.16 1.84 1.16 3.11 0 4.43-2.63 5.42-5.14 5.7.41.36.76 1.07.76 2.16 0 1.56-.01 2.82-.01 3.21 0 .26.18.58.69.48A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/>
      </svg>
      <div class="meta">
        <div class="name">GitHub</div>
        <div class="url">github.com/user</div>
      </div>
      <span class="go">→</span>
    </a>

    <!-- DISCORD FIXED -->
    <a class="link-row" href="https://discord.gg/ZTu4jpaErBr" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.369A19.791 19.791 0 0016.558 3c-.2.36-.43.85-.59 1.23a18.27 18.27 0 00-5.936 0A12.14 12.14 0 009.44 3c-1.34.23-2.65.6-3.76 1.37C3.5 7.07 2.7 9.73 3.02 12.37c1.9 1.4 3.76 2.26 5.58 2.81.45-.6.85-1.24 1.2-1.92-.67-.25-1.3-.55-1.9-.92.16-.12.32-.25.47-.37 3.64 1.7 7.58 1.7 11.2 0 .15.12.31.25.47.37-.6.37-1.23.67-1.9.92.35.68.75 1.32 1.2 1.92 1.82-.55 3.68-1.41 5.58-2.81.39-3.2-.66-5.83-2.98-7.99zM9.5 14.5c-.83 0-1.5-.75-1.5-1.67 0-.92.67-1.66 1.5-1.66s1.5.74 1.5 1.66c0 .92-.67 1.67-1.5 1.67zm5 0c-.83 0-1.5-.75-1.5-1.67 0-.92.67-1.66 1.5-1.66s1.5.74 1.5 1.66c0 .92-.67 1.67-1.5 1.67z"/>
      </svg>

      <div class="meta">
        <div class="name">Discord - Dev-Market.de</div>
        <div class="url">discord.gg/ZTu4jpaErBr</div>
      </div>

      <span class="go">→</span>
    </a>

  </div>
</section>

</main>

<footer class="wrap">
  <div>© Linus</div>
  <div>Built with HTML & CSS</div>
</footer>

</body>
</html>
